# The URL the site will be built for
base_url = "https://helix-editor.com"

# Whether to automatically compile all Sass files in the sass directory
compile_sass = false

# Whether to build a search index to be used later on by a JavaScript library
build_search_index = true

# Generate an RSS feed
generate_feeds = true

# The site title, author and description; used in feeds by default.
title = "Helix"
description = "A post-modern modal text editor."
author = "Helix Contributors"

[markdown.highlighting]
# Custom theme + tree-sitter-query (.scm / .tsq) grammar live under syntaxes/
theme = "Helix"
extra_themes = ["syntaxes/helix.json"]
extra_grammars = [
  "syntaxes/tree-sitter-query.tmLanguage.json",
  "syntaxes/tsq.tmLanguage.json",
]

[extra]
# Put all your custom variables here
